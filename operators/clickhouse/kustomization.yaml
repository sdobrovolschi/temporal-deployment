apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- operator-v0.25.6.yaml
patches:
  - target:
      kind: Deployment
      name: clickhouse-operator
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: clickhouse-operator
      spec:
        template:
          spec:
            containers:
              - name: clickhouse-operator
                resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                  limits:
                    cpu: 100m
                    memory: 128Mi
