apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- cluster-operator-v2.19.1.yaml
- messaging-topology-operator-with-certmanager-v1.18.3.yaml
patches:
  - target:
      kind: Deployment
      name: rabbitmq-cluster-operator
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: rabbitmq-cluster-operator
      spec:
        template:
          spec:
            containers:
              - name: operator
                resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                  limits:
                    cpu: 100m
                    memory: 128Mi
  - target:
      kind: Deployment
      name: messaging-topology-operator
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: messaging-topology-operator
      spec:
        template:
          spec:
            containers:
              - name: manager
                resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                  limits:
                    cpu: 100m
                    memory: 128Mi
