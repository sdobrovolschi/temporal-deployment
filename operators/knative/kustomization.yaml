apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- operator-v1.21.1.yaml
patches:
  - target:
      kind: Deployment
      name: knative-operator
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: knative-operator
      spec:
        template:
          spec:
            containers:
              - name: knative-operator
                resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                  limits:
                    cpu: 100m
                    memory: 128Mi
  - target:
      kind: Deployment
      name: operator-webhook
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: operator-webhook
      spec:
        template:
          spec:
            containers:
              - name: operator-webhook
                resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                  limits:
                    cpu: 100m
                    memory: 128Mi
