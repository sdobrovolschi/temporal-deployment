apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- operator-v1.28.0.yaml
patches:
  - target:
      kind: Deployment
      name: cnpg-controller-manager
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: cnpg-controller-manager
      spec:
        template:
          spec:
            containers:
              - name: manager
                resources:
                  requests:
                    cpu: 25m
                    memory: 32Mi
                  limits:
                    cpu: 50m
                    memory: 64Mi
