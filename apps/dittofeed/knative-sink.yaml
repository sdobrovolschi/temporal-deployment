apiVersion: v1
kind: ConfigMap
metadata:
  name: dittofeed-sink
  namespace: dittofeed
data:
  caddy.json: |
    {
      "admin": {
        "disabled": true
      },
      "apps": {
        "http": {
          "servers": {
            "server0": {
              "listen": [":8080"],
              "routes": [
                {
                  "match": [
                    {
                      "method": ["POST"],
                      "path": ["/api/public/apps/*"]
                    }
                  ],
                  "handle": [
                    {
                      "handler": "reverse_proxy",
                      "headers": {
                        "request": {
                          "set": {
                            "Host": ["{http.reverse_proxy.upstream.hostport}"],
                            "Content-Type": ["application/json"],
                            "Authorization": ["Basic {env.DITTOFEED_API_KEY}"]
                          }
                        }
                      },
                      "upstreams": [
                        {
                          "dial": "{env.DITTOFEED_API_HOST}:80"
                        }
                      ],
                      "transport": {
                        "protocol": "http"
                      }
                    }
                  ]
                },
                {
                  "handle": [
                    {
                      "handler": "static_response",
                      "status_code": 404
                    }
                  ]
                }
              ]
            }
          }
        }
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dittofeed-sink
  namespace: dittofeed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dittofeed-sink
  template:
    metadata:
      labels:
        app: dittofeed-sink
    spec:
      containers:
        - name: caddy
          image: caddy:2.11.2
          imagePullPolicy: IfNotPresent
          args:
            - caddy
            - run
            - --config
            - /etc/caddy/caddy.json
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DITTOFEED_API_HOST
              value: release-name-dittofeed.dittofeed.svc.cluster.local
            - name: DITTOFEED_API_KEY
              value: ZmUzY2Y4NmYtM2I4OS00ZTUxLWFkNTEtNGQwODkxZTIxYTJkOjRmZDY3MDUxMzk4NGE5ZWI=
          volumeMounts:
            - name: caddy-config
              mountPath: /etc/caddy
              readOnly: true
            - name: caddy-data
              mountPath: /data
            - name: caddy-tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: caddy-config
          configMap:
            name: dittofeed-sink
        - name: caddy-data
          emptyDir: {}
        - name: caddy-tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: dittofeed-sink
  namespace: dittofeed
spec:
  selector:
    app: dittofeed-sink
  ports:
    - name: http
      port: 80
      targetPort: 8080
